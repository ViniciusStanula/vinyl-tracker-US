name: Vinyl Crawler

on:
  schedule:
    - cron: '0 */2 * * *'  # every 2 hours
  workflow_dispatch:        # manual trigger from the GitHub Actions UI

# Prevent concurrent runs: if a previous crawl is still going when the next
# one is scheduled, let the in-progress run finish rather than cancelling it.
concurrency:
  group: crawler
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # hard ceiling (3h); crawler --time-limit 160 stops 20 min before
    permissions:
      issues: write        # needed for the "open issue on failure" step
    env:
      # Opt into Node.js 24 now before it becomes mandatory on 2026-06-02.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: crawler/requirements.txt

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run crawler
        # --stale-max 2000  increased ceiling; longer budget means Phase 3 can actually reach it.
        # --stale-workers 4  runs Phase 0 (deal re-validation) and Phase 3 in parallel;
        #                    cuts Phase 0 time from ~27 min to ~14 min, freeing budget for Phase 3.
        # --time-limit 160  leaves a 20-min buffer before the GHA 180-min ceiling.
        run: python crawler/main.py --max-pages 400 --stale-max 2000 --stale-workers 4 --time-limit 160
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ASSOCIATE_TAG: ${{ secrets.ASSOCIATE_TAG }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          REVALIDATE_URL: ${{ secrets.REVALIDATE_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Crawler failed — ${new Date().toISOString().slice(0, 16)} UTC`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `The hourly crawler workflow failed.\n\n[View run](${runUrl})`,
              labels: ['crawler-failure'],
            });
